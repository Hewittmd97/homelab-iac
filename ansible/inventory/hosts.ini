[proxmox]
homelab ansible_host=192.168.1.153 ansible_connection=local

[lxc_containers]
plex proxmox_vmid=100 ansible_python_interpreter=/bin/python3
radarr proxmox_vmid=101
sonarr proxmox_vmid=103
prowlarr proxmox_vmid=104

[lxc_containers:vars]
ansible_connection=community.proxmox.proxmox_pct_remote
ansible_host=192.168.1.153
ansible_user=root
proxmox_remote_private_key_file=/root/.ssh/id_ed25519
